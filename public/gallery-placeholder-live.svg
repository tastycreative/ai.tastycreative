  <text x="200" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#ef4444" opacity="0.8">LIVE</text>
  <text x="200" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Live stream content</text>
</svg>
