  <circle cx="200" cy="125" r="22" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.4"/>
  <circle cx="200" cy="125" r="36" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.25"/>
